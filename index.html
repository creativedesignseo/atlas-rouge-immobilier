<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Rouge Immobilier | Villas, Riads & Appartements à Marrakech</title>
    <meta name="description" content="Découvrez plus de 3 500 annonces immobilières à Marrakech : villas avec piscine, riads rénovés, appartements neufs. Accompagnement francophone de A à Z." />
    <meta name="keywords" content="immobilier Marrakech, villa Marrakech, riad Marrakech, appartement Marrakech, achat immobilier Maroc, agence immobilière Marrakech" />
    <meta name="author" content="Atlas Rouge Immobilier" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="canonical" href="https://atlasrouge.com/" />

    <!-- hreflang — declarar las 3 versiones de idioma para que Google las trate como tales -->
    <link rel="alternate" hreflang="fr" href="https://atlasrouge.com/fr/" />
    <link rel="alternate" hreflang="es" href="https://atlasrouge.com/es/" />
    <link rel="alternate" hreflang="en" href="https://atlasrouge.com/en/" />
    <link rel="alternate" hreflang="x-default" href="https://atlasrouge.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://atlasrouge.com/" />
    <meta property="og:title" content="Atlas Rouge Immobilier | Villas, Riads & Appartements à Marrakech" />
    <meta property="og:description" content="Découvrez plus de 3 500 annonces immobilières à Marrakech. Accompagnement francophone de A à Z." />
    <meta property="og:image" content="https://atlasrouge.com/og-image.jpg" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://atlasrouge.com/" />
    <meta name="twitter:title" content="Atlas Rouge Immobilier | Villas, Riads & Appartements à Marrakech" />
    <meta name="twitter:description" content="Découvrez plus de 3 500 annonces immobilières à Marrakech. Accompagnement francophone de A à Z." />
    <meta name="twitter:image" content="https://atlasrouge.com/og-image.jpg" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Google Fonts via <link> (non-render-blocking) instead of CSS @import.
         Playfair dropped: it was a legacy fallback only, no live usage. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Inter:wght@300;400;500;600;700&display=swap"
    />

    <!-- Structured data: agency identity + site search action -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "RealEstateAgent",
          "@id": "https://atlasrouge.com/#organization",
          "name": "Atlas Rouge Immobilier",
          "url": "https://atlasrouge.com",
          "logo": "https://atlasrouge.com/favicon.svg",
          "image": "https://atlasrouge.com/og-image.jpg",
          "areaServed": {
            "@type": "City",
            "name": "Marrakech"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://atlasrouge.com/#website",
          "url": "https://atlasrouge.com",
          "name": "Atlas Rouge Immobilier",
          "publisher": { "@id": "https://atlasrouge.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://atlasrouge.com/acheter?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
