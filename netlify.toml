[functions]
  directory = "netlify/functions"

[[edge_functions]]
  function = "img-proxy"
  path = "/img/*"

# og-rewrite: configurado en su propio archivo .ts vía export const config

# Stale chunks (e.g. Search-XXX.js from a previous deploy) must NOT fall
# back to /index.html — that returns HTML with a wrong MIME type and the
# browser refuses to execute it. Return 404 so the chunk-load handler in
# main.tsx can detect the error and force a reload.
[[redirects]]
  from = "/assets/*"
  status = 404

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers ───────────────────────────────────────────────────────
# Aplicados a todo el sitio. CSP es relativamente permisiva para Supabase,
# CartoCDN (tiles), Google Fonts y nuestro propio /img/ proxy.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "DENY"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "geolocation=(self), camera=(), microphone=(), payment=()"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://basemaps.cartocdn.com https://www.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Cache largo para assets versionados de Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
